server:
  port: ${PORT:8081}
  shutdown: graceful
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  tomcat:
    connection-timeout: 20000
    max-threads: 200
    min-spare-threads: 10

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: campus-cafe-backend
  lifecycle:
    timeout-per-shutdown-phase: 20s
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  jpa:
    open-in-view: false

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: ${JWT_EXPIRATION:900000} # 15 minutes in ms
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days in ms

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

mail:
  smtp:
    host: ${SMTP_HOST:smtp.sendgrid.net}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:apikey}
    password: ${SMTP_PASSWORD}
    from: ${MAIL_FROM:no-reply@campuscafe.com}
    from-name: ${MAIL_FROM_NAME:Campus Cafe}
    otp-expiry-minutes: ${OTP_EXPIRY_MINUTES:5}
    max-attempts: ${MAIL_MAX_ATTEMPTS:10}
    initial-delay-ms: ${MAIL_INITIAL_DELAY_MS:1000}
