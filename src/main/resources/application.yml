server:
  port: ${PORT:8081}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: campus-cafe-backend

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:9a6747fc6259aa374ab4e1bb2a0918dd2199978e5f19e6eef5a070514e21a2f9}
      expiration: ${JWT_EXPIRATION:900000} # 15 minutes in ms
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days in ms

mail:
  smtp:
    host: ${SMTP_HOST:smtp.sendgrid.net}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:apikey}
    password: ${SMTP_PASSWORD:}
    from: ${MAIL_FROM:no-reply@campuscafe.com}
    from-name: ${MAIL_FROM_NAME:Campus Cafe}
    otp-expiry-minutes: ${OTP_EXPIRY_MINUTES:5}
    max-attempts: ${MAIL_MAX_ATTEMPTS:10}
    initial-delay-ms: ${MAIL_INITIAL_DELAY_MS:1000}
