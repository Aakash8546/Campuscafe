spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/campus_cafe
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

application:
  security:
    jwt:
      secret-key: 9a6747fc6259aa374ab4e1bb2a0918dd2199978e5f19e6eef5a070514e21a2f9
      expiration: 900000 # 15 minutes (in ms)
      refresh-token:
        expiration: 604800000 # 7 days (in ms)
